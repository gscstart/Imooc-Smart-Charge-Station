# SpringBoot 日志配置
logging:
  config: classpath:logback-spring.xml


# MQTT客户端配置
mqtt:
  # EMQX服务器地址 (tcp://ip:端口)
  host: tcp://emqx:1883
  # 工厂模式id
  client_id: imooc_charge_station_mqtt
  # 发送主题
  topic: charge/cmd
  options:
    # 设置为false表示服务器会保留客户端的连接记录，
    # 客户端重连之后能获取到服务器在客户端断开连接期间推送的消息
    clean_session: false
